<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JustJam - AI-Powered Urban Traffic Management System">
    <meta name="keywords" content="traffic management, AI, smart city, GenAI">
    <meta name="author" content="JustJam Team">
    <title>JustJam - Urban Traffic Optimizer</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #root { 
            width: 100%; 
            min-height: 100vh; 
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        /* Tailwind-like utilities */
        .flex { display: flex; }
        .items-center { align-items: center; }
        .items-start { align-items: flex-start; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-1 { gap: 0.25rem; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .gap-4 { gap: 1rem; }
        .gap-6 { gap: 1.5rem; }
        .grid { display: grid; }
        .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }
        .space-y-3 > * + * { margin-top: 0.75rem; }
        .space-y-4 > * + * { margin-top: 1rem; }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .space-y-8 > * + * { margin-top: 2rem; }
        .rounded-xl { border-radius: 0.75rem; }
        .rounded-lg { border-radius: 0.5rem; }
        .rounded-full { border-radius: 9999px; }
        .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .shadow-2xl { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .bg-white { background-color: white; }
        .text-white { color: white; }
        .cursor-pointer { cursor: pointer; }
        .transition-all { transition: all 0.3s; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
        .sticky { position: sticky; }
        .top-0 { top: 0; }
        .z-10 { z-index: 10; }
        .border-b { border-bottom-width: 1px; }
        .border-2 { border-width: 2px; }
        .border-l-4 { border-left-width: 4px; }
        .overflow-hidden { overflow: hidden; }
        
        @media (min-width: 768px) {
            .grid-cols-1.md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .grid-cols-1.md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (min-width: 1024px) {
            .grid-cols-1.lg\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .grid-cols-1.lg\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
            .grid-cols-1.lg\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Activity, TrendingUp, TrendingDown, Zap, Navigation, 
            AlertTriangle, CheckCircle, Clock, Users, Leaf, 
            BarChart3, MapPin, Radio 
        } = lucide;

        const TrafficOptimizerApp = () => {
          const [activeTab, setActiveTab] = useState('overview');
          const [liveData, setLiveData] = useState({
            avgSpeed: 42,
            congestionLevel: 68,
            activeSensors: 1247,
            incidentCount: 3
          });
          const [trafficFlow, setTrafficFlow] = useState(65);

          useEffect(() => {
            const interval = setInterval(() => {
              setLiveData(prev => ({
                avgSpeed: Math.max(20, Math.min(60, prev.avgSpeed + (Math.random() - 0.5) * 3)),
                congestionLevel: Math.max(30, Math.min(90, prev.congestionLevel + (Math.random() - 0.5) * 5)),
                activeSensors: 1247 + Math.floor(Math.random() * 10),
                incidentCount: Math.max(0, Math.min(8, prev.incidentCount + (Math.random() > 0.7 ? 1 : -0.3)))
              }));
              setTrafficFlow(prev => Math.max(30, Math.min(95, prev + (Math.random() - 0.5) * 8)));
            }, 2000);
            return () => clearInterval(interval);
          }, []);

          const StatCard = ({ icon: Icon, label, value, unit, trend, color }) => (
            <div style={{
              backgroundColor: 'white',
              borderRadius: '0.75rem',
              padding: '1.5rem',
              boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)',
              border: '2px solid #f3f4f6',
              transition: 'all 0.3s'
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.25)';
              e.currentTarget.style.transform = 'translateY(-4px)';
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
              e.currentTarget.style.transform = 'translateY(0)';
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '1rem' }}>
                <div style={{
                  padding: '0.75rem',
                  borderRadius: '0.5rem',
                  background: color
                }}>
                  <Icon size={24} color="white" />
                </div>
                {trend && (
                  <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '0.25rem',
                    padding: '0.25rem 0.75rem',
                    borderRadius: '9999px',
                    fontSize: '0.75rem',
                    fontWeight: '600',
                    backgroundColor: trend > 0 ? '#fee2e2' : '#d1fae5',
                    color: trend > 0 ? '#991b1b' : '#065f46'
                  }}>
                    {trend > 0 ? <TrendingUp size={12} /> : <TrendingDown size={12} />}
                    {Math.abs(trend)}%
                  </div>
                )}
              </div>
              <div style={{ fontSize: '1.875rem', fontWeight: '700', color: '#1f2937', marginBottom: '0.25rem' }}>
                {typeof value === 'number' ? value.toFixed(0) : value}{unit}
              </div>
              <div style={{ fontSize: '0.875rem', color: '#6b7280' }}>{label}</div>
            </div>
          );

          const IntersectionCard = ({ name, status, waitTime, throughput }) => (
            <div style={{
              backgroundColor: 'white',
              borderRadius: '0.5rem',
              padding: '1rem',
              border: '2px solid #f3f4f6',
              cursor: 'pointer',
              transition: 'all 0.3s'
            }}
            onMouseEnter={(e) => e.currentTarget.style.borderColor = '#818cf8'}
            onMouseLeave={(e) => e.currentTarget.style.borderColor = '#f3f4f6'}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                  <MapPin size={16} color="#4f46e5" />
                  <span style={{ fontWeight: '600', color: '#1f2937' }}>{name}</span>
                </div>
                <div style={{
                  width: '0.75rem',
                  height: '0.75rem',
                  borderRadius: '9999px',
                  backgroundColor: status === 'optimal' ? '#10b981' : status === 'moderate' ? '#f59e0b' : '#ef4444',
                  animation: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                }}></div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.75rem', fontSize: '0.875rem' }}>
                <div>
                  <div style={{ color: '#6b7280', fontSize: '0.75rem' }}>Avg Wait</div>
                  <div style={{ fontWeight: '600', color: '#374151' }}>{waitTime}s</div>
                </div>
                <div>
                  <div style={{ color: '#6b7280', fontSize: '0.75rem' }}>Throughput</div>
                  <div style={{ fontWeight: '600', color: '#374151' }}>{throughput}/min</div>
                </div>
              </div>
            </div>
          );

          const PredictionCard = ({ time, prediction, confidence }) => (
            <div style={{
              background: 'linear-gradient(135deg, #faf5ff 0%, #ede9fe 100%)',
              borderRadius: '0.5rem',
              padding: '1rem',
              border: '1px solid #e9d5ff'
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                <span style={{ fontSize: '0.875rem', fontWeight: '600', color: '#374151' }}>{time}</span>
                <span style={{
                  fontSize: '0.75rem',
                  backgroundColor: '#ddd6fe',
                  color: '#5b21b6',
                  padding: '0.25rem 0.5rem',
                  borderRadius: '9999px',
                  fontWeight: '600'
                }}>
                  {confidence}% confident
                </span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                <div style={{
                  fontSize: '1.5rem',
                  fontWeight: '700',
                  color: prediction === 'Heavy' ? '#dc2626' : prediction === 'Moderate' ? '#d97706' : '#059669'
                }}>
                  {prediction}
                </div>
                <div style={{ flex: 1, backgroundColor: '#e5e7eb', borderRadius: '9999px', height: '0.5rem' }}>
                  <div style={{
                    height: '0.5rem',
                    borderRadius: '9999px',
                    width: `${prediction === 'Heavy' ? 85 : prediction === 'Moderate' ? 60 : 35}%`,
                    backgroundColor: prediction === 'Heavy' ? '#ef4444' : prediction === 'Moderate' ? '#f59e0b' : '#10b981',
                    transition: 'width 0.5s'
                  }}></div>
                </div>
              </div>
            </div>
          );

          return (
            <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #f8fafc 0%, #eff6ff 50%, #eef2ff 100%)' }}>
              {/* Header */}
              <div style={{ background: 'linear-gradient(90deg, #4f46e5 0%, #7c3aed 50%, #ec4899 100%)', color: 'white', boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.25)' }}>
                <div className="container" style={{ padding: '1.5rem' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
                      <div style={{ backgroundColor: 'rgba(255,255,255,0.2)', backdropFilter: 'blur(10px)', borderRadius: '0.75rem', padding: '0.75rem' }}>
                        <Navigation size={32} />
                      </div>
                      <div>
                        <h1 style={{ fontSize: '1.875rem', fontWeight: '700', margin: 0 }}>Urban Traffic Optimizer</h1>
                        <p style={{ color: '#c7d2fe', fontSize: '0.875rem', margin: '0.25rem 0 0 0' }}>AI-Powered Smart City Traffic Management</p>
                      </div>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', backgroundColor: 'rgba(255,255,255,0.2)', backdropFilter: 'blur(10px)', borderRadius: '9999px', padding: '0.5rem 1rem' }}>
                      <Radio size={16} style={{ animation: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite' }} />
                      <span style={{ fontSize: '0.875rem', fontWeight: '600' }}>LIVE</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Tabs */}
              <div style={{ backgroundColor: 'white', borderBottom: '1px solid #e5e7eb', boxShadow: '0 1px 2px 0 rgba(0, 0, 0, 0.05)', position: 'sticky', top: 0, zIndex: 10 }}>
                <div className="container" style={{ padding: '0 1.5rem' }}>
                  <div style={{ display: 'flex', gap: '0.25rem' }}>
                    {[
                      { id: 'overview', label: 'Overview', icon: BarChart3 },
                      { id: 'predictions', label: 'AI Predictions', icon: Zap },
                      { id: 'intersections', label: 'Intersections', icon: MapPin },
                      { id: 'incidents', label: 'Incidents', icon: AlertTriangle }
                    ].map(tab => (
                      <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        style={{
                          display: 'flex',
                          alignItems: 'center',
                          gap: '0.5rem',
                          padding: '1rem 1.5rem',
                          fontWeight: '600',
                          border: 'none',
                          background: 'transparent',
                          cursor: 'pointer',
                          color: activeTab === tab.id ? '#4f46e5' : '#4b5563',
                          borderBottom: activeTab === tab.id ? '3px solid #4f46e5' : 'none',
                          backgroundColor: activeTab === tab.id ? '#eef2ff' : 'transparent',
                          transition: 'all 0.3s'
                        }}
                        onMouseEnter={(e) => {
                          if (activeTab !== tab.id) {
                            e.currentTarget.style.color = '#1f2937';
                            e.currentTarget.style.backgroundColor = '#f9fafb';
                          }
                        }}
                        onMouseLeave={(e) => {
                          if (activeTab !== tab.id) {
                            e.currentTarget.style.color = '#4b5563';
                            e.currentTarget.style.backgroundColor = 'transparent';
                          }
                        }}
                      >
                        <tab.icon size={16} />
                        {tab.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>

              {/* Content */}
              <div className="container" style={{ padding: '2rem 1.5rem' }}>
                {activeTab === 'overview' && (
                  <div className="space-y-8">
                    <div>
                      <h2 style={{ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <Activity size={24} color="#4f46e5" />
                        Real-Time Metrics
                      </h2>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4" style={{ gap: '1.5rem' }}>
                        <StatCard
                          icon={TrendingUp}
                          label="Average Speed"
                          value={liveData.avgSpeed}
                          unit=" km/h"
                          trend={-12}
                          color="linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%)"
                        />
                        <StatCard
                          icon={Activity}
                          label="Congestion Level"
                          value={liveData.congestionLevel}
                          unit="%"
                          trend={8}
                          color="linear-gradient(135deg, #ef4444 0%, #f97316 100%)"
                        />
                        <StatCard
                          icon={Radio}
                          label="Active Sensors"
                          value={liveData.activeSensors}
                          unit=""
                          color="linear-gradient(135deg, #10b981 0%, #059669 100%)"
                        />
                        <StatCard
                          icon={AlertTriangle}
                          label="Active Incidents"
                          value={liveData.incidentCount.toFixed(0)}
                          unit=""
                          trend={-25}
                          color="linear-gradient(135deg, #a855f7 0%, #ec4899 100%)"
                        />
                      </div>
                    </div>

                    {/* Traffic Flow */}
                    <div style={{ backgroundColor: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)', border: '2px solid #f3f4f6' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                        <h3 style={{ fontSize: '1.25rem', fontWeight: '700', color: '#1f2937', margin: 0 }}>City-Wide Traffic Flow</h3>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.875rem', color: '#6b7280' }}>
                          <Clock size={16} />
                          Updated 2s ago
                        </div>
                      </div>
                      <div className="space-y-4">
                        {[
                          { zone: 'Downtown Core', flow: trafficFlow, color: '#4f46e5' },
                          { zone: 'Northern District', flow: trafficFlow - 15, color: '#3b82f6' },
                          { zone: 'Eastern Highway', flow: trafficFlow + 10, color: '#7c3aed' },
                          { zone: 'Western Suburbs', flow: trafficFlow - 25, color: '#10b981' },
                          { zone: 'Southern Industrial', flow: trafficFlow - 5, color: '#f97316' }
                        ].map((zone, idx) => (
                          <div key={idx}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem' }}>
                              <span style={{ fontSize: '0.875rem', fontWeight: '600', color: '#374151' }}>{zone.zone}</span>
                              <span style={{ fontSize: '0.875rem', fontWeight: '700', color: '#1f2937' }}>{zone.flow.toFixed(0)}% capacity</span>
                            </div>
                            <div style={{ width: '100%', backgroundColor: '#e5e7eb', borderRadius: '9999px', height: '0.75rem', overflow: 'hidden' }}>
                              <div style={{
                                height: '0.75rem',
                                background: `linear-gradient(90deg, ${zone.color}88, ${zone.color})`,
                                borderRadius: '9999px',
                                width: `${zone.flow}%`,
                                transition: 'width 0.5s ease-out'
                              }}></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Impact Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3" style={{ gap: '1.5rem' }}>
                      <div style={{ background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', color: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)' }}>
                        <Leaf size={40} style={{ marginBottom: '0.75rem', opacity: 0.9 }} />
                        <div style={{ fontSize: '1.875rem', fontWeight: '700', marginBottom: '0.25rem' }}>-2,340 kg</div>
                        <div style={{ color: '#d1fae5' }}>CO₂ Saved Today</div>
                      </div>
                      <div style={{ background: 'linear-gradient(135deg, #3b82f6 0%, #4f46e5 100%)', color: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)' }}>
                        <Clock size={40} style={{ marginBottom: '0.75rem', opacity: 0.9 }} />
                        <div style={{ fontSize: '1.875rem', fontWeight: '700', marginBottom: '0.25rem' }}>18 min</div>
                        <div style={{ color: '#dbeafe' }}>Avg Time Saved/Trip</div>
                      </div>
                      <div style={{ background: 'linear-gradient(135deg, #a855f7 0%, #ec4899 100%)', color: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)' }}>
                        <Users size={40} style={{ marginBottom: '0.75rem', opacity: 0.9 }} />
                        <div style={{ fontSize: '1.875rem', fontWeight: '700', marginBottom: '0.25rem' }}>847K</div>
                        <div style={{ color: '#fae8ff' }}>Commuters Served</div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'predictions' && (
                  <div className="space-y-6">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <h2 style={{ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', margin: 0, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <Zap size={24} color="#eab308" />
                        AI-Powered Traffic Predictions
                      </h2>
                      <div style={{ background: 'linear-gradient(90deg, #faf5ff 0%, #fce7f3 100%)', padding: '0.5rem 1rem', borderRadius: '9999px' }}>
                        <span style={{ fontSize: '0.875rem', fontWeight: '600', color: '#7c3aed' }}>Neural Network Active</span>
                      </div>
                    </div>

                    <div style={{ backgroundColor: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)', border: '2px solid #f3f4f6' }}>
                      <h3 style={{ fontSize: '1.125rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem' }}>Next 2 Hours - Downtown Core</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4" style={{ gap: '1rem' }}>
                        <PredictionCard time="15 min" prediction="Moderate" confidence={94} />
                        <PredictionCard time="30 min" prediction="Heavy" confidence={91} />
                        <PredictionCard time="1 hour" prediction="Heavy" confidence={87} />
                        <PredictionCard time="2 hours" prediction="Light" confidence={82} />
                      </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2" style={{ gap: '1.5rem' }}>
                      {/* ML Performance */}
                      <div style={{ backgroundColor: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)', border: '2px solid #f3f4f6' }}>
                        <h3 style={{ fontSize: '1.125rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem' }}>ML Model Performance</h3>
                        <div className="space-y-4">
                          {[
                            { label: 'Prediction Accuracy', value: '94.2%', width: 94.2, color: 'linear-gradient(90deg, #10b981, #059669)' },
                            { label: 'Model Confidence', value: '91.8%', width: 91.8, color: 'linear-gradient(90deg, #3b82f6, #4f46e5)' },
                            { label: 'Response Time', value: '0.3s', width: 97, color: 'linear-gradient(90deg, #a855f7, #ec4899)' }
                          ].map((metric, idx) => (
                            <div key={idx}>
                              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                                <span style={{ fontSize: '0.875rem', color: '#6b7280' }}>{metric.label}</span>
                                <span style={{ fontSize: '0.875rem', fontWeight: '700', color: '#1f2937' }}>{metric.value}</span>
                              </div>
                              <div style={{ width: '100%', backgroundColor: '#e5e7eb', borderRadius: '9999px', height: '0.5rem' }}>
                                <div style={{
                                  height: '0.5rem',
                                  background: metric.color,
                                  borderRadius: '9999px',
                                  width: `${metric.width}%`,
                                  transition: 'width 1s'
                                }}></div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* AI Insights */}
                      <div style={{ background: 'linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%)', color: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)' }}>
                        <h3 style={{ fontSize: '1.125rem', fontWeight: '700', marginBottom: '1rem' }}>AI Insights</h3>
                        <div className="space-y-3">
                          {[
                            { icon: CheckCircle, title: 'Optimal Route Detected', desc: 'Highway 101 is 12 min faster than usual due to reduced traffic' },
                            { icon: AlertTriangle, title: 'Congestion Alert', desc: 'Predicted heavy traffic at Main St in 45 min - rerouting 340 vehicles' },
                            { icon: Zap, title: 'Signal Optimization', desc: 'Adjusted 23 intersections - reducing avg wait by 18 seconds' }
                          ].map((insight, idx) => (
                            <div key={idx} style={{ display: 'flex', gap: '0.75rem', backgroundColor: 'rgba(255,255,255,0.1)', backdropFilter: 'blur(4px)', borderRadius: '0.5rem', padding: '0.75rem' }}>
                              <insight.icon size={20} style={{ flexShrink: 0, marginTop: '0.125rem' }} />
                              <div style={{ fontSize: '0.875rem' }}>
                                <div style={{ fontWeight: '600', marginBottom: '0.25rem' }}>{insight.title}</div>
                                <div style={{ color: '#c7d2fe' }}>{insight.desc}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'intersections' && (
                  <div className="space-y-6">
                    <h2 style={{ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', margin: 0, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <MapPin size={24} color="#4f46e5" />
                      Smart Intersection Management
                    </h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3" style={{ gap: '1rem' }}>
                      <IntersectionCard name="Main St & 5th Ave" status="optimal" waitTime={12} throughput={145} />
                      <IntersectionCard name="Broadway & Park" status="moderate" waitTime={28} throughput={98} />
                      <IntersectionCard name="Highway 101 Exit 3A" status="optimal" waitTime={8} throughput={210} />
                      <IntersectionCard name="Central Ave & Oak" status="congested" waitTime={45} throughput={67} />
                      <IntersectionCard name="Market St & 2nd" status="optimal" waitTime={15} throughput={132} />
                      <IntersectionCard name="River Rd & Bridge" status="moderate" waitTime={22} throughput={115} />
                    </div>

                    <div style={{ backgroundColor: 'white', borderRadius: '0.75rem', padding: '1.5rem', boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)', border: '2px solid #f3f4f6' }}>
                      <h3 style={{ fontSize: '1.125rem', fontWeight: '700', color: '#1f2937', marginBottom: '1rem' }}>AI Signal Optimization Active</h3>
                      <div className="grid grid-cols-1 md:grid-cols-3" style={{ gap: '1.5rem' }}>
                        <div style={{ textAlign: 'center' }}>
                          <div style={{ fontSize: '2.25rem', fontWeight: '700', color: '#4f46e5', marginBottom: '0.5rem' }}>23</div>
                          <div style={{ fontSize: '0.875rem', color: '#6b7280' }}>Intersections Managed</div>
                        </div>
                        <div style={{ textAlign: 'center' }}>
                          <div style={{ fontSize: '2.25rem', fontWeight: '700', color: '#10b981', marginBottom: '0.5rem' }}>-18s</div>
                          <div style={{ fontSize: '0.875rem', color: '#6b7280' }}>Avg Wait Reduction</div>
                        </div>
                        <div style={{ textAlign: 'center' }}>
                          <div style={{ fontSize: '2.25rem', fontWeight: '700', color: '#a855f7', marginBottom: '0.5rem' }}>+31%</div>
                          <div style={{ fontSize: '0.875rem', color: '#6b7280' }}>Throughput Increase</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'incidents' && (
                  <div className="space-y-6">
                    <h2 style={{ fontSize: '1.5rem', fontWeight: '700', color: '#1f2937', margin: 0, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                      <AlertTriangle size={24} color="#f97316" />
                      Active Incidents & Alerts
                    </h2>
                    <div className="space-y-4">
                      {[
                        { type: 'accident', location: 'Highway 101 Mile 23', severity: 'high', time: '5 min ago', affected: 340, color: '#ef4444' },
                        { type: 'roadwork', location: 'Main St Bridge', severity: 'medium', time: '2 hours ago', affected: 120, color: '#f59e0b' },
                        { type: 'weather', location: 'Northern District', severity: 'low', time: '15 min ago', affected: 85, color: '#3b82f6' }
                      ].map((incident, idx) => (
                        <div key={idx} style={{
                          backgroundColor: 'white',
                          borderRadius: '0.75rem',
                          padding: '1.5rem',
                          boxShadow: '0 10px 15px -3px rgba(0, 0, 0, 0.1)',
                          borderLeft: `4px solid ${incident.color}`
                        }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                            <div style={{ flex: 1 }}>
                              <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem', marginBottom: '0.5rem' }}>
                                <AlertTriangle size={20} color={incident.color} />
                                <span style={{ fontWeight: '700', color: '#1f2937', textTransform: 'capitalize' }}>{incident.type}</span>
                                <span style={{
                                  padding: '0.25rem 0.5rem',
                                  borderRadius: '9999px',
                                  fontSize: '0.75rem',
                                  fontWeight: '600',
                                  backgroundColor: incident.severity === 'high' ? '#fee2e2' : incident.severity === 'medium' ? '#fef3c7' : '#dbeafe',
                                  color: incident.severity === 'high' ? '#991b1b' : incident.severity === 'medium' ? '#92400e' : '#1e40af'
                                }}>
                                  {incident.severity.toUpperCase()}
                                </span>
                              </div>
                              <div style={{ color: '#374151', marginBottom: '0.5rem' }}>{incident.location}</div>
                              <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', fontSize: '0.875rem', color: '#6b7280' }}>
                                <span style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                                  <Clock size={16} />
                                  {incident.time}
                                </span>
                                <span style={{ display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                                  <Users size={16} />
                                  {incident.affected} vehicles affected
                                </span>
                              </div>
                            </div>
                            <button style={{
                              padding: '0.5rem 1rem',
                              backgroundColor: '#4f46e5',
                              color: 'white',
                              borderRadius: '0.5rem',
                              fontWeight: '600',
                              border: 'none',
                              cursor: 'pointer',
                              transition: 'background-color 0.3s'
                            }}
                            onMouseEnter={(e) => e.currentTarget.style.backgroundColor = '#4338ca'}
                            onMouseLeave={(e) => e.currentTarget.style.backgroundColor = '#4f46e5'}>
                              Manage
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TrafficOptimizerApp />);
    </script>
</body>
</html>
